<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="100%" height="100%">
    <defs>
        <!-- Gradients -->
        <linearGradient id="logoPrimary" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#5B5FEF" />
            <stop offset="100%" stop-color="#7C3AED" />
        </linearGradient>
        <linearGradient id="logoSecondary" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7C3AED" />
            <stop offset="100%" stop-color="#A78BFA" />
        </linearGradient>
        <linearGradient id="logoAccent" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#A78BFA" />
            <stop offset="100%" stop-color="#5B5FEF" />
        </linearGradient>
        
        <!-- Shadows -->
        <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#5B5FEF" flood-opacity="0.15" />
        </filter>
        
        <!-- CSS Animations inside the SVG -->
        <style type="text/css">
            @keyframes drawPath {
                to {
                    stroke-dashoffset: 0;
                }
            }
            @keyframes fadeIn {
                to {
                    opacity: 1;
                }
            }
            @keyframes popIn {
                0% {
                    transform: scale(0.8);
                    opacity: 0;
                }
                100% {
                    transform: scale(1);
                    opacity: 1;
                }
            }
            
            .draw-stroke {
                stroke-dasharray: 150;
                stroke-dashoffset: 150;
                animation: drawPath 1.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            }
            
            .icon-layer-1 { animation-delay: 0.1s; }
            .icon-layer-2 { animation-delay: 0.3s; }
            .icon-layer-3 { animation-delay: 0.5s; }
            .icon-layer-4 { animation-delay: 0.7s; }
            
            .text-fade {
                opacity: 0;
                animation: fadeIn 1.2s ease-out 1.2s forwards;
            }
            
            .wordmark-group rect, .wordmark-group path {
                stroke-dasharray: 100;
                stroke-dashoffset: 100;
                animation: drawPath 1.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            }
            .letter-i1 { animation-delay: 0.4s; }
            .letter-i2 { animation-delay: 0.5s; }
            .letter-c { animation-delay: 0.7s; }
            .letter-e { animation-delay: 0.9s; }
        </style>
    </defs>
    
    <!-- Collapsible/Independent Icon on Left -->
    <g filter="url(#logoShadow)" transform="translate(10, 10) scale(0.75)">
        <path class="draw-stroke icon-layer-1" d="M 14 24 L 14 76" stroke="url(#logoPrimary)" stroke-width="8" stroke-linecap="round" fill="none" />
        <path class="draw-stroke icon-layer-2" d="M 26 24 L 26 76" stroke="url(#logoPrimary)" stroke-width="8" stroke-linecap="round" fill="none" />
        <path class="draw-stroke icon-layer-3" d="M 54 24 C 34 24 30 35 30 50 C 30 65 34 76 54 76" stroke="url(#logoSecondary)" stroke-width="8" stroke-linecap="round" fill="none" />
        <path class="draw-stroke icon-layer-4" d="M 52 24 L 86 24 M 66 24 L 66 76 M 48 50 L 82 50 M 52 76 L 86 76" stroke="url(#logoAccent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    </g>
    
    <!-- Wordmark 'IICE' on Right in pure vector paths (Inverted to Light off-white) -->
    <g class="wordmark-group">
        <!-- First 'I' -->
        <rect class="letter-i1" x="90" y="22" width="8" height="36" rx="3.5" stroke="#F9FAFB" stroke-width="2" fill="#F9FAFB"/>
        <!-- Second 'I' -->
        <rect class="letter-i2" x="106" y="22" width="8" height="36" rx="3.5" stroke="#F9FAFB" stroke-width="2" fill="#F9FAFB"/>
        <!-- 'C' -->
        <path class="letter-c" d="M 144 26 C 130 26 126 33 126 40 C 126 47 130 54 144 54" fill="none" stroke="#F9FAFB" stroke-width="8" stroke-linecap="round"/>
        <!-- 'E' -->
        <path class="letter-e" d="M 176 26 L 162 26 L 162 54 L 176 54 M 162 40 L 172 40" fill="none" stroke="#F9FAFB" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- Subtext -->
    <text class="text-fade" x="90" y="70" font-family="'Inter', -apple-system, sans-serif" font-weight="600" font-size="8.5" fill="#A78BFA" letter-spacing="0.22em">ENTERPRISE SYSTEM</text>
</svg>
