<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <defs>
        <!-- Custom Brand Gradients -->
        <linearGradient id="iicePrimary" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#5B5FEF" />
            <stop offset="100%" stop-color="#7C3AED" />
        </linearGradient>
        <linearGradient id="iiceAccent" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#A78BFA" />
            <stop offset="100%" stop-color="#5B5FEF" />
        </linearGradient>
        <linearGradient id="iiceGlow" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#7C3AED" />
            <stop offset="100%" stop-color="#A78BFA" />
        </linearGradient>
        <!-- Premium Layered Shadows -->
        <filter id="iiceShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#5B5FEF" flood-opacity="0.18" />
        </filter>
    </defs>
    
    <!-- 3D Isometric Interlocking Geometry representing IICE -->
    <g filter="url(#iiceShadow)" transform="translate(5, 5)">
        <!-- Back Left Plane -->
        <path d="M 25 75 L 25 25 L 50 10 L 50 40 Z" fill="url(#iicePrimary)" opacity="0.9" />
        <!-- Back Right Plane -->
        <path d="M 50 10 L 75 25 L 75 75 L 50 60 Z" fill="url(#iiceAccent)" />
        <!-- Front Central Fold Plane -->
        <path d="M 37.5 32.5 L 62.5 47.5 L 62.5 87.5 L 37.5 72.5 Z" fill="url(#iiceGlow)" opacity="0.95" />
        <!-- Core Anchor Node -->
        <circle cx="50" cy="48" r="5" fill="#FFFFFF" />
        <circle cx="50" cy="48" r="2.5" fill="#5B5FEF" />
    </g>
</svg>
