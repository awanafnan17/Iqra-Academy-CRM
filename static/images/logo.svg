<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="100%" height="100%">
    <defs>
        <!-- Gradients -->
        <linearGradient id="logoPrimary" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#5B5FEF" />
            <stop offset="100%" stop-color="#7C3AED" />
        </linearGradient>
        <linearGradient id="logoAccent" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#A78BFA" />
            <stop offset="100%" stop-color="#5B5FEF" />
        </linearGradient>
        <linearGradient id="logoGlow" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#7C3AED" />
            <stop offset="100%" stop-color="#A78BFA" />
        </linearGradient>
        <!-- Layered Shadows -->
        <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#5B5FEF" flood-opacity="0.15" />
        </filter>
    </defs>
    
    <!-- Mini Isometric Brand Mark on Left -->
    <g filter="url(#logoShadow)" transform="translate(10, 5) scale(0.75)">
        <path d="M 25 75 L 25 25 L 50 10 L 50 40 Z" fill="url(#logoPrimary)" opacity="0.9" />
        <path d="M 50 10 L 75 25 L 75 75 L 50 60 Z" fill="url(#logoAccent)" />
        <path d="M 37.5 32.5 L 62.5 47.5 L 62.5 87.5 L 37.5 72.5 Z" fill="url(#logoGlow)" opacity="0.95" />
        <circle cx="50" cy="48" r="5" fill="#FFFFFF" />
    </g>
    
    <!-- Geometric Vector Paths for the wordmark "IICE" -->
    <rect x="85" y="24" width="8" height="30" rx="2" fill="#1F2937"/>
    <rect x="99" y="24" width="8" height="30" rx="2" fill="#1F2937"/>
    <path d="M139 24 C127 24 119 31 119 39 C119 47 127 54 139 54 C145 54 147 51 147 51 L147 45 C147 45 144 48 139 48 C132 48 127 44 127 39 C127 34 132 30 139 30 C144 30 147 33 147 33 L147 27 C147 27 145 24 139 24 Z" fill="#1F2937"/>
    <path d="M155 24 L176 24 L176 30 L163 30 L163 36 L173 36 L173 42 L163 42 L163 48 L176 48 L176 54 L155 54 Z" fill="#1F2937"/>
    
    <!-- Subtext Wordmark -->
    <text x="85" y="66" font-family="'Inter', -apple-system, sans-serif" font-weight="600" font-size="8.5" fill="#7C3AED" letter-spacing="0.22em">ENTERPRISE SYSTEM</text>
</svg>
