{% extends 'layouts/panel_base.html' %}
{% load static %}

{% block title %}Password Updated - Iqra Academy{% endblock %}

{% block content %}
<div class="container-fluid px-0" style="max-width: 550px; margin: 0 auto;">
    <div class="glass-card p-5 text-center animate-fade-in">
        <div class="d-inline-flex align-items-center justify-content-center bg-success bg-opacity-10 text-success p-3 rounded-4 mb-4">
            <i class="fa-solid fa-circle-check fa-3x"></i>
        </div>
        <h4 class="fw-bold text-primary mb-2">Credentials Updated</h4>
        <p class="text-secondary mb-4">Your login password has been updated. You can now continue using the Iqra Academy platform securely.</p>

        <a href="{% url 'accounts:post_login_redirect' %}" class="btn btn-saas px-4">
            Go to Dashboard <i class="fa-solid fa-arrow-right ms-2"></i>
        </a>
    </div>
</div>
{% endblock %}
