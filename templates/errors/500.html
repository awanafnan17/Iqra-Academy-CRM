<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - Iqra Academy</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .error-container {
            text-align: center;
            padding: 2rem;
        }
        .error-code {
            font-size: 6rem;
            font-weight: 700;
            color: #dee2e6;
            margin: 0;
        }
        .error-message {
            font-size: 1.5rem;
            margin: 1rem 0;
            color: #495057;
        }
        .error-detail {
            color: #6c757d;
            margin-bottom: 2rem;
        }
        .back-link {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background-color: #0d6efd;
            color: #fff;
            text-decoration: none;
            border-radius: 0.375rem;
            transition: background-color 0.15s;
        }
        .back-link:hover {
            background-color: #0b5ed7;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <p class="error-code">500</p>
        <p class="error-message">Something went wrong</p>
        <p class="error-detail">An unexpected error occurred. Please try again later.</p>
        <a href="/" class="back-link">Go to Home</a>
    </div>
</body>
</html>
