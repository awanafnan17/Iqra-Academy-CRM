{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <script>
    (function() {
      var saved = localStorage.getItem('iqra-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      document.documentElement.classList.add('theme-' + saved);
    })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Iqra Academy{% endblock %}</title>
    <link rel="shortcut icon" href="{% static 'images/favicon.ico' %}" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon-16x16.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/apple-touch-icon.png' %}">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Consolidated design system -->
    <link rel="stylesheet" href="{% static 'css/design-system.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="crm-app {% block body_class %}{% endblock %}">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="crm-app">
        {% block main_layout %}
            {% block content %}{% endblock %}
        {% endblock %}
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{% static 'js/ui.js' %}"></script>
    <script>
    (function() {
      'use strict';

      /* ---- Theme Toggle ---- */
      var themeKey = 'iqra-theme';
      var toggle   = document.getElementById('themeToggle');
      var icon     = document.getElementById('themeIcon');

      function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.classList.remove('theme-dark', 'theme-light');
        document.documentElement.classList.add('theme-' + theme);
        if (icon) {
          icon.className = theme === 'dark'
            ? 'fas fa-sun'
            : 'fas fa-moon';
        }
        localStorage.setItem(themeKey, theme);
      }

      // Apply saved theme on load
      applyTheme(localStorage.getItem(themeKey) || 'dark');

      if (toggle) {
        toggle.addEventListener('click', function() {
          var current = document.documentElement.getAttribute('data-theme');
          applyTheme(current === 'dark' ? 'light' : 'dark');
        });
      }

      /* ---- Mobile Sidebar ---- */
      var sidebarToggle  = document.getElementById('sidebarToggle');
      var sidebarOverlay = document.getElementById('sidebarOverlay');
      var sidebar        = document.querySelector('.sidebar');

      function openSidebar() {
        if (sidebar)        sidebar.classList.add('mobile-open');
        if (sidebarOverlay) sidebarOverlay.classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      function closeSidebar() {
        if (sidebar)        sidebar.classList.remove('mobile-open');
        if (sidebarOverlay) sidebarOverlay.classList.remove('active');
        document.body.style.overflow = '';
      }

      if (sidebarToggle)  sidebarToggle.addEventListener('click', openSidebar);
      if (sidebarOverlay) sidebarOverlay.addEventListener('click', closeSidebar);

      /* ---- Count-Up Animation for Metric Cards ---- */
      function countUp(el) {
        var target   = parseFloat(el.dataset.target) || 0;
        var duration = parseInt(el.dataset.duration)  || 1200;
        var prefix   = el.dataset.prefix || '';
        var suffix   = el.dataset.suffix || '';
        var decimals = parseInt(el.dataset.decimals)  || 0;
        var start    = 0;
        var startTime = null;

        function step(timestamp) {
          if (!startTime) startTime = timestamp;
          var progress = Math.min((timestamp - startTime) / duration, 1);
          var eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
          var current = start + (target - start) * eased;
          el.textContent = prefix +
            current.toFixed(decimals)
              .replace(/\B(?=(\d{3})+(?!\d))/g, ',') +
            suffix;
          if (progress < 1) requestAnimationFrame(step);
        }

        requestAnimationFrame(step);
      }

      // Observe metric values for count-up on viewport entry
      if ('IntersectionObserver' in window) {
        var obs = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting && !entry.target.dataset.counted) {
              entry.target.dataset.counted = '1';
              countUp(entry.target);
            }
          });
        }, { threshold: .3 });

        document.querySelectorAll('[data-target]').forEach(function(el) {
          obs.observe(el);
        });
      }

      /* ---- Active sidebar link highlight ---- */
      var currentPath = window.location.pathname;
      document.querySelectorAll('.sidebar a, .sidebar .nav-link, .sidebar-link').forEach(function(link) {
        if (link.getAttribute('href') === currentPath) {
          link.classList.add('active');
        }
      });

      /* ---- Auto-dismiss Django messages after 4 seconds ---- */
      setTimeout(function() {
        document.querySelectorAll('.alert').forEach(function(alert) {
          alert.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
          alert.style.opacity = '0';
          alert.style.transform = 'translateY(-10px)';
          setTimeout(function() {
            alert.remove();
          }, 500);
        });
      }, 4000);

      /* ---- Dynamic progress bars loader ---- */
      document.addEventListener('DOMContentLoaded', function(){
        document.querySelectorAll('[data-progress]').forEach(function(el){
          var val = parseFloat(el.getAttribute('data-progress')) || 0;
          if (val > 100) val = 100;
          el.style.width = val + '%';
        });
      });

    }());
    </script>
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        // Global DOM cleanup for Django widgets: strip double-dashes from select options
        document.querySelectorAll("select option").forEach(function(opt) {
            if (opt.textContent.includes("--")) {
                opt.textContent = opt.textContent.replace(/-+/g, "").trim();
            }
        });
    });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
