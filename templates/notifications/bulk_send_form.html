{% extends "layouts/panel_base.html" %}

{% block title %}Send Bulk Notification - Iqra Academy{% endblock %}

{% block content %}
<div class="container-fluid py-4 px-0">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="card glass-elevated p-4 animate-fade-in">
        <h5 class="fw-bold mb-4 text-primary">
          <i class="fas fa-bell me-2 text-muted"></i>
          Send Bulk Notification
        </h5>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Category</label>
            <select name="category" class="form-select">
              <option value="general">General</option>
              <option value="fee">Fee Reminder</option>
              <option value="attendance">Attendance Alert</option>
              <option value="exam">Exam Notice</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Title</label>
            <input type="text" name="title" class="form-control"
              placeholder="e.g., Eid Holiday Announcement" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Target Group</label>
            <select name="target_group" class="form-select">
              <option value="all">All Students</option>
              <option value="session">By Session</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Message</label>
            <textarea name="message" class="form-control" rows="4"
              placeholder="Dear Parents, tomorrow is a holiday..." required></textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4 shadow-sm">
              <i class="fas fa-paper-plane me-2"></i>Send Now
            </button>
            <a href="javascript:history.back()"
               class="btn btn-outline-primary px-4">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
{{ block.super }}
<script>
    document.addEventListener("DOMContentLoaded", function() {
        // Strip double-dashes from select placeholders to ensure premium look
        document.querySelectorAll("select option").forEach(opt => {
            if (opt.textContent.includes("--")) {
                opt.textContent = opt.textContent.replace(/-+/g, "").trim();
            }
        });
    });
</script>
{% endblock %}
